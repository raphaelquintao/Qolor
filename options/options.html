<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Qolor</title>
  <link href="../assets/icons/icon2.svg" rel="icon" type="image/x-icon"/>
  <link rel="stylesheet" href="options.css">
  <script src="options.js" type="module"></script>

  <meta name="color-scheme" content="dark light"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
</head>
<body>

<div class="content">

  <header id="main-header">
    <div class="left logo-container">
      <q-svg class="logo" src="../assets/icons/icon.svg" width="1em" height="1em"></q-svg>
      <span class="title">Qolor</span>
    </div>

    <div class="actions flex gap-0-5rem align-items-center">
      <button id="btn-reload" class="btn-info" style="display: none">
        <i class="fa fa-refresh"></i>
        Reload
      </button>
      <button id="btn-new" class="btn-success" title="New Scheme">
        <i class="fas fa-plus"></i>
      </button>
    </div>

  </header>

  <hr/>

  <section class="section flex flex-row flex-wrap full-width gap-0-3rem justify-content-center global-options">
    <div class="flex flex-col advanced-prefs-section hide" data-collapsed="true">
      <header>
        <span class="title"><i class="fas fa-gear"></i></span>
        <span class="indicator"><i class="fas fa-chevron-down"></i></span>
      </header>
      <div class="flex flex-col collapse prefs-container"></div>
    </div>

    <div class="button-toolbar">
      <label title="Color Wheel">
        <input class="btn btn-icon" type="checkbox" id="opt-color-wheel">
        <span class="color-wheel-icon"></span>
      </label>
    </div>

    <div class="button-toolbar" id="output-selector"></div>
  </section>

  <hr/>

  <section class="section full-width flex flex-col scheme-section">
    <div id="scheme-selector" class="scheme-selector">
      <div class="scheme-container">
        <div class="loading scheme-card">__MSG_Loading...__</div>
      </div>
    </div>
  </section>

  <hr/>

  <section class="section flex flex-row flex-wrap full-width gap-0-3rem justify-content-center">
    <div class="button-toolbar">
      <label title="Lock Scheme">
        <input class="btn" type="checkbox" id="opt-lock">
        <i class="fas fa-lock"></i>
      </label>
    </div>

    <div class="button-toolbar" style="">
      <label title="Light Mode">
        <input class="btn" type="radio" name="opt-theme-mode" value="light">
        <i class="fas fa-sun"></i>
      </label>
      <label title="Auto">
        <input class="btn" type="radio" name="opt-theme-mode" value="auto">
        <i class="fas fa-circle-half-stroke"></i>
      </label>
      <label title="Dark Mode">
        <input class="btn" type="radio" name="opt-theme-mode" value="dark">
        <i class="fas fa-moon"></i>
      </label>
    </div>

    <div class="button-toolbar gen-modes">
      <label title="Single Tone">
        <input class="btn" type="radio" name="opt-gen-mode" value="normal">
        <q-svg src="../assets/icons/droplet.svg"
               width="1.35em" height="1.35em">
        </q-svg>
      </label>
      <label title="Colorful">
        <input class="btn" type="radio" name="opt-gen-mode" value="colorful">
        <q-svg src="../assets/icons/triadic.svg"
               width="1.35em" height="1.35em">
        </q-svg>

      </label>
      <label title="Dual Tone">
        <input class="btn" type="radio" name="opt-gen-mode" value="dual">
        <q-svg src="../assets/icons/dual.svg"
               width="1.35em" height="1.35em">
        </q-svg>


      </label>
    </div>

  </section>

  <hr/>

  <section id="pickers-container" class="flex"></section>

  <hr/>

  <footer id="main-footer" class="flex flex-col">
    <section class="grid gap-0-5rem align-items-center full-width padding-0-5rem">
      <div class="left">
        <button id="btn-sync-load" title="restore_tooltip">
          <span class="default-state">
            <i class="fa-solid fa-cloud-arrow-down"></i>
          </span>
          <span class="confirm-state">
            <i class="fa-solid fa-triangle-exclamation"></i> __MSG_Sure?__
          </span>
        </button>
      </div>
      <div class="center">
        <button id="btn-surprise" title="Generate a random Scheme" class="surprise-button">
          <i class="fas fa-shuffle"></i> __MSG_Surprise Me!__
        </button>
      </div>
      <div class="right">
        <button id="btn-sync-save" class="btn-info" title="Save all to Cloud">
          <i class="fa-solid fa-cloud-arrow-up"></i>
        </button>
      </div>
    </section>
  </footer>

  <section style="display: none">
    <button class="btn-accent">
      Primary
    </button>
    <button class="btn-danger">
      <i class="fas fa-circle-xmark"></i> Danger
    </button>
    <button class="btn-warning">
      <i class="fas fa-circle-exclamation"></i> Warning
    </button>
    <button class="btn-success">
      <i class="fas fa-circle-check"></i> Success
    </button>
    <button class="btn-info">
      <i class="fas fa-circle-info"></i> Info
    </button>
  </section>

  <section style="display: none">
    <div class="delete-view alert warning" style="width: 200px; aspect-ratio: 16/9; margin: auto">
      <button class="btn-icon dismiss"><i class="fa-solid fa-xmark"></i></button>
      <header>
        Sync Action
      </header>
<!--      <div class="content">-->
<!--        Are you sure you want to delete this scheme?-->
<!--      </div>-->

      <footer>
        <button class="btn btn-success">
          <i class="fa-solid fa-cloud-arrow-down"></i> Restore
        </button>
        <button class="btn btn-info">
          <i class="fa-solid fa-cloud-arrow-up"></i> Save
        </button>
      </footer>
    </div>

  </section>

</div>

</body>
</html>
