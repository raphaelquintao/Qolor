<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Qolor</title>
  <link href="../assets/icons/icon3.svg" rel="icon" type="image/x-icon"/>
  <link rel="stylesheet" href="options.css">
  <script src="options.js" type="module"></script>

  <meta name="color-scheme" content="dark light"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
</head>
<body>

<div class="content">

  <header id="main-header">
    <div class="left logo-container">
      <q-svg class="logo" src="../assets/icons/icon.svg" width="1em" height="1em"></q-svg>

      <span class="title">Qolor</span>
    </div>

    <div class="actions flex gap-0-5rem align-items-center">
      <button id="btn-reload" style="display: none">Reload</button>
      <button id="btn-sync" title="Save all on Cloud">
        <i class="fas fa-sync"></i>
      </button>
      <button id="btn-new" class="" title="New">
        <i class="fas fa-plus"></i>
      </button>
    </div>

  </header>
  <hr/>


  <section class="section flex flex-row flex-wrap full-width gap-0-3rem justify-content-center global-options">

    <div class="flex flex-col  prefs-section" data-collapsed="true" style="display: none">
      <header>
        <span class="title"><i class="fas fa-gear"></i></span>
        <span class="indicator"><i class="fas fa-chevron-down"></i></span>
      </header>
      <div class="flex flex-col collapse prefs-container"></div>
    </div>

    <div class="button-toolbar">
      <label title="Color Wheel">
        <input class="btn btn-icon" type="checkbox" id="opt-color-wheel">
        <span class="color-wheel-icon"></span>
      </label>
    </div>

    <div class="button-toolbar" id="output-selector"></div>
  </section>

  <hr/>


  <section class="section flex flex-col full-width gap-0 scheme-section">
    <header class="section-header" style="display: none;">
      <span class="title">Schemes</span><small class="info">(32)</small>
      <span class="on-right"></span>
    </header>

    <div id="scheme-selector" class="scheme-selector">
      <div class="scheme-container">
        <div class="loading scheme-card">Loading...</div>
      </div>
    </div>


  </section>

  <hr/>

  <section class="section flex flex-row flex-wrap full-width gap-0-3rem justify-content-center">
    <div class="button-toolbar">
      <label title="Lock">
        <input class="btn" type="checkbox" id="opt-lock">
        <i class="fas fa-lock"></i>
      </label>
    </div>

    <div class="button-toolbar" style="">
      <label title="Light Mode">
        <input class="btn" type="radio" name="opt-theme-mode" value="light">
        <i class="fas fa-sun"></i>
      </label>
      <label title="Auto">
        <input class="btn" type="radio" name="opt-theme-mode" value="auto">
        <i class="fas fa-circle-half-stroke"></i>
      </label>
      <label title="Dark Mode">
        <input class="btn" type="radio" name="opt-theme-mode" value="dark">
        <i class="fas fa-moon"></i>
      </label>
    </div>

    <div class="button-toolbar gen-modes">
      <label title="Single Tone">
        <input class="btn" type="radio" name="opt-gen-mode" value="normal">
        <q-svg src="../assets/icons/droplet.svg"
               width="1.35em" height="1.35em"
               style="--primary: currentColor; --secondary: orange; --tertiary: blue">
        </q-svg>
      </label>
      <label title="Colorful">
        <input class="btn" type="radio" name="opt-gen-mode" value="colorful">
        <q-svg src="../assets/icons/triadic.svg"
               width="1.35em" height="1.35em"
               style="--primary: oklch(0.77082471 0.13449834 48.81337601);
                      --secondary: oklch(0.78014629 0.17800827 318.81383594);
                      --tertiary: oklch(0.75286075 0.09835012 228.81405772);">
        </q-svg>

      </label>
      <label title="Dual Tone">
        <input class="btn" type="radio" name="opt-gen-mode" value="dual">
        <q-svg src="../assets/icons/dual.svg"
               width="1.35em" height="1.35em"
               style="--primary: red; --secondary: oklch(0.78014629 0.17800827 318.81383594); --tertiary: oklch(0.75286075 0.09835012 228.81405772)"
        ></q-svg>


      </label>
    </div>

  </section>

  <hr/>

  <section id="pickers-container" class="flex"></section>

  <hr/>


  <!--  <hr/>-->

  <footer id="main-footer" class="flex flex-col">
    <section class="flex gap-0-5rem align-items-center justify-content-center padding-0-5rem">
      <button id="btn-surprise" class="surprise-button" title="Generate a random scheme">
        <i class="fas fa-shuffle"></i> Surprise Me!
      </button>
    </section>
  </footer>

</div>

</body>
</html>
