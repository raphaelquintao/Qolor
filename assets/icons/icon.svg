<svg xmlns="http://www.w3.org/2000/svg"
     width="48" height="48" viewBox="0 0 470 470"
     style="--ring: #f45777; --leg: #57cef6"
>

  <defs>
    <linearGradient id="linear1" x1="0" y1="0" x2="1" y2="1" color-interpolation="auto">
      <stop offset="0%" stop-color="#f45777"/>
      <stop offset="100%" stop-color="#F12750"/>
    </linearGradient>

    <linearGradient id="linear2" x1="0" y1="0" x2="1" y2="1" color-interpolation="auto">
      <stop offset="0%" stop-color="#57cef6"/>
      <stop offset="100%" stop-color="#0EB9F2"/>
    </linearGradient>


    <radialGradient id="r1" color-interpolation="linearRGB" cx="50%" cy="50%" r="50%">
      <stop offset="00%" stop-color="oklch(0.005 0.167 15)"/>
      <stop offset="70%" stop-color="oklch(0.005 0.167 15)"/>
      <stop offset="95%" stop-color="oklch(0.805 0.167 15)"/>
      <stop offset="100%" stop-color="oklch(0.105 0.167 15)"/>
    </radialGradient>


    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="1" dy="1" stdDeviation="4"
                    flood-color="black"
                    flood-opacity="1"/>
    </filter>

    <filter id="light">
      <feDiffuseLighting in="SourceGraphic" result="light" lighting-color="white">
        <fePointLight x="180" y="110" z="120"/>
        <!--        <fePointLight x="300" y="360" z="40"/>-->

        <!--                        <feSpotLight x="150" y="60" z="20" pointsAtX="235" pointsAtY="235" pointsAtZ="0" specularExponent="10"/>-->
      </feDiffuseLighting>

      <feComposite in="SourceGraphic" in2="light" operator="arithmetic" k1="2" k2="1" k3="0" k4="0"/>

    </filter>


    <mask id="mask">
      <rect x="0" y="0" width="100%" height="100%" fill="white"/>
      <circle cx="50%" cy="50%" r="135" fill="black"/>
    </mask>
  </defs>


  <g filter="url(#light)">
    <circle id="ring" cx="50%" cy="50%" r="220" fill="url(#linear1)" mask="url(#mask)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="-40" y="60"
          width="80" height="230"
          rx="40" ry="40"
          fill="url(#linear2)"

          style="transform: translate(50%, 50%) rotate(-45deg)"
    />
  </g>


</svg>











