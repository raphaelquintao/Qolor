<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 200 200"
     width="250" height="250"
>

  <style>
    .lixo {
    --p1: var(--primary, red);
    --p2: oklch(from var(--primary) calc(l - 0.15) c h);

    --s1: var(--secondary, green);
    --s2: oklch(from var(--secondary) calc(l - 0.15) c h);

    --t1: var(--tertiary, blue);
    --t2: oklch(from var(--tertiary) calc(l - 0.15) c h);
    }
  </style>

  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="hsl(0, 0%, 70%)" stop-opacity="1" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="grad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="black" stop-opacity="0" />
      <stop offset="100%" stop-color="black" stop-opacity="1" />
    </linearGradient>

  </defs>

<!--  <rect x="0" y="0" width="100%" height="100%" fill="hsl(325 80% 0% / 0.9)" />-->

<!--  <circle cx="50%" cy="50%" r="90" fill="url(#q)" stroke="black" stroke-width="7"/>-->

  <rect width="200" height="200" fill="#f45777" />
  <rect width="200" height="200" fill="url(#grad1)" />
  <rect width="200" height="200" fill="url(#grad2)" />


</svg>