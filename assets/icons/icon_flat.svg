<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 144 144"
  width="48" height="48"
  preserveAspectRatio="xMidYMid meet"
  shape-rendering="geometricPrecision"
  color-rendering="optimizeQuality"
  text-rendering="optimizeLegibility"
  image-rendering="optimizeQuality"
  class="colors"
>
  <style>
    .colors {
      --p: oklch(0.674 0.200 79);
      --s: oklch(0.644 0.23 8);
      --t: oklch(0.674 0.200 223);


      --p1: var(--primary, var(--p));
      --p2: oklch(from var(--p1) calc(l - 0.1) c h);

      --s1: var(--secondary, var(--s));
      --s2: oklch(from var(--s1) calc(l - 0.09) c h);

      --t1: var(--tertiary, var(--t));
      --t2: oklch(from var(--t1) calc(l + 0.09) c h);
    }

  </style>

  <defs>
    <linearGradient id="ring_gradient"
                    x1="0%" y1="0%" x2="100%" y2="100%"
                    gradientUnits="objectBoundingBox"
                    color-interpolation="auto">
      <stop stop-color="var(--s1)" offset="0%"/>
      <stop stop-color="var(--s2)" offset="100%"/>
    </linearGradient>


    <linearGradient id="leg_gradient"
                    x1="0%" y1="0%" x2="100%" y2="100%"
                    gradientUnits="objectBoundingBox"
                    color-interpolation="auto">
      <stop stop-color="var(--t1)" offset="0%"/>
      <stop stop-color="var(--t2)" offset="100%"/>
    </linearGradient>

  </defs>

  <path
    id="ring_path"
    fill-rule="evenodd"
    fill="url(#ring_gradient)" fill-opacity="1"
    stroke="url(#ring_gradient)" stroke-opacity="1"
    stroke-width="1" opacity="1"
    d="M 143,72 A 71,71 0 0,1 1,72 A 71,71 0 0,1 143,72 Z
           M 112,72 A 40,40 0 0,1 32,72 A 40,40 0 0,1 112,72 Z"
  />


  <g transform="rotate(-45 142 142)" opacity="1">
    <path
      id="leg_path"
      fill="url(#leg_gradient)" fill-opacity="1"
      stroke="black" stroke-opacity="0.9"
      stroke-width="1"
      d="M 158,67
         L 158,120
         A 16,16 0 0,1 126,120
         L 126,67
         A 16,16 0 0,1 158,67
         Z"
    />
  </g>


</svg>