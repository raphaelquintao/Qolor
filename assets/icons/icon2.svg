<svg xmlns="http://www.w3.org/2000/svg"
     width="30" height="30" viewBox="0 0 440 440"
>
  <defs>

    <linearGradient id="ring-gradient" x1="0" y1="0" x2="1" y2="1"
                    color-interpolation="auto">

      <stop offset="0%" stop-color="#f45777"/>
      <stop offset="100%" stop-color="#F12750"/>

    </linearGradient>


    <linearGradient id="leg-gradient" x1="0" y1="0" x2="1" y2="1"
                    color-interpolation="auto">
      <stop offset="0%" stop-color="#57cef6"/>
      <stop offset="100%" stop-color="#0EB9F2"/>
    </linearGradient>


<!--    <filter id="shadow">-->
<!--      <feDropShadow dx="1" dy="1" stdDeviation="4"-->
<!--                    flood-color="black"-->
<!--                    flood-opacity="1"/>-->
<!--    </filter>-->


    <mask id="mask">
      <circle class="outer" cx="50%" cy="50%" r="100%" fill="white"/>
      <circle class="inner" cx="50%" cy="50%" r="120" fill="black"/>
    </mask>

  </defs>

  <circle id="ring" stroke="black" stroke-width="0"
          vector-effect="non-scaling-stroke"
          cx="50%" cy="50%" r="220"
          fill="url(#ring-gradient)"

  />

  <!--  <g filter="url(#shadow)" id="ring-group">-->

  <!--  </g>-->


  <!--  <g filter="url(#shadow)">-->
  <g transform="rotate(-45 440 440)" >
    <rect x="440" y="440"
          width="90" height="200"
          rx="0" ry="0"
          fill="url(#leg-gradient)"
          transform="translate(-45 -245) "
    />
  </g>
  <!--  </g>-->

</svg>
