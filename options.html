<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Photophobia</title>
  <link href="assets/icon.png" rel="icon" type="image/x-icon"/>


  <link rel="stylesheet" href="assets/fontawesome7/css/all.min.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/qpicker.css">

  <script src="js/options.js" type="module"></script>
  <meta name="color-scheme" content="dark light"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
</head>
<body>

<div class="content">

  <header class="flex flex-center-v">
    <h2 id="title">Photophobia</h2>
    <span class="on-right"></span>
    <select id="scheme-select">
      <option value="QGray">QGray</option>
      <option value="QPink">QPink</option>
      <option value="QDay" selected>QDay</option>
    </select>

    <button id="btn-popup" popover="help-popover" class="btn-icon" title="Help">
      <i class="fas fa-circle-question"></i>
    </button>

  </header>

  <hr/>

  <section class="section flex ">
    <span id="scheme-name" contenteditable="true" spellcheck="false">OK Computer</span>
    <button id="btn-del" class="btn-icon" title="Delete">
      <i class="fas fa-trash-can"></i>
    </button>
    <span class="on-right"></span>
    <button id="btn-undo" class="btn-icon" title="Restore">
      <i class="fas fa-rotate-left"></i>
    </button>
    <button id="btn-new" class="btn-icon" title="Duplicate">
      <i class="fas fa-plus"></i>
    </button>
  </section>
  <hr/>

  <section class="section ">


    <input id="cm-l1" class="btn" type="checkbox" value="asdlight">
    <label for="cm-l1" title="Light Mode">
      <i class="fas fa-sun"></i>
    </label>

    <div class="button-toolbar">
      <input id="cm-l" class="btn" type="radio" name="color-mode" value="light">
      <label for="cm-l" title="Light Mode">
        <i class="fas fa-sun"></i>
      </label>
      <input id="cm-a" class="btn" type="radio" name="color-mode" value="auto">
      <label for="cm-a" title="Auto (System)">
        <i class="fas fa-circle-half-stroke"></i>
      </label>
      <input id="cm-d" class="btn" type="radio" name="color-mode" value="dark">
      <label for="cm-d" title="Dark Mode">
        <i class="fas fa-moon"></i>
      </label>
    </div>

    <div class="info" id="contrast"></div>

  </section>

  <hr/>

  <section class="flex flex-row flex-center-h">
    <section id="opt-panel" class="flex flex-col"></section>
    <!--    <hr/>-->
    <section id="opt-text" class="flex flex-col"></section>
  </section>


  <hr/>

  <footer id="buttons" class="section flex">
    <button id="btn-reload">Reload</button>
    <button id="btn-default" title="Clear all you data">Clear</button>
    <button id="btn-sync" title="Save all on Cloud">Sync</button>
    <span class="on-right"></span>
    <button id="btn-save" title="Save all Locally">Save</button>
  </footer>

</div>

</body>
</html>
